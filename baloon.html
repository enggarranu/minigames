<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Anak: Pecahkan Balon!</title>
    <style>
        /* Desain Dasar */
        * {
            box-sizing: border-box;
            touch-action: manipulation; /* Mencegah zoom di HP */
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #87CEEB; /* Warna langit biru cerah */
            overflow: hidden; /* Mencegah layar bisa di-scroll */
            width: 100vw; /* Memaksa lebar penuh */
            height: 100vh; /* Memaksa tinggi penuh (KUNCI PERBAIKANNYA DI SINI) */
            position: relative;
        }

        /* Papan Skor di Atas */
        .header {
            position: absolute;
            top: 20px;
            left: 50%; /* Membuat posisinya di tengah */
            transform: translateX(-50%); /* Menyeimbangkan posisi ke tengah persis */
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 3px solid #FFEB3B;
            text-align: center;
            min-width: 250px;
        }

        h1 {
            font-size: 20px;
            color: #FF5722;
            margin-bottom: 5px;
        }

        .score {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
        }

        /* Desain Balon */
        .balloon {
            width: 70px;
            height: 90px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: absolute;
            bottom: -120px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 1;
            /* Efek terbang ke atas */
            animation: floatUp linear forwards; 
        }

        /* Tali Balon */
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.3);
        }

        /* Animasi Terbang */
        @keyframes floatUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120vh); } /* Terbang melewati layar atas */
        }

        /* Animasi Meletus */
        .pop-animation {
            animation: pop 0.2s forwards !important;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Pecahkan Balonnya!</h1>
        <div class="score" id="scoreDisplay">⭐ 0</div>
    </div>

    <script>
        let score = 0;
        const scoreDisplay = document.getElementById('scoreDisplay');
        
        // Pilihan warna-warna cerah untuk balon
        const colors = ['#FF5252', '#448AFF', '#69F0AE', '#FFD740', '#E040FB', '#FF9800'];
        
        // Audio (Siapkan file pop.mp3)
        const soundPop = new Audio('pop.mp3');

        function playPopSound() {
            try {
                soundPop.currentTime = 0;
                soundPop.play().catch(e => console.log("Menunggu interaksi audio"));
            } catch(e) {}
        }

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');

            // Posisi horizontal acak (dari kiri ke kanan, maksimal 80vw agar tidak keluar layar)
            const randomX = Math.random() * 80; 
            balloon.style.left = `${randomX}vw`;

            // Warna acak
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.backgroundColor = randomColor;

            // Kecepatan terbang acak (antara 4 sampai 7 detik)
            const duration = Math.random() * 3 + 4; 
            balloon.style.animationDuration = `${duration}s`;

            // Apa yang terjadi saat balon disentuh (di-tap)
            balloon.addEventListener('click', function() {
                playPopSound();
                score++;
                scoreDisplay.innerText = `⭐ ${score}`;
                
                // Mainkan animasi meletus lalu hapus elemen dari layar
                balloon.classList.add('pop-animation');
                setTimeout(() => {
                    balloon.remove();
                }, 200);
            });

            document.body.appendChild(balloon);

            // Bersihkan memori: Hapus balon jika sudah melewati layar atas
            setTimeout(() => {
                if (document.body.contains(balloon)) {
                    balloon.remove();
                }
            }, duration * 1000);
        }

        // Munculkan balon baru setiap 1 detik
        setInterval(createBalloon, 1000);
    </script>
</body>
</html>
