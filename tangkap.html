<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Anak: Tangkap Buah!</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: none; /* Mencegah layar ter-scroll saat menggeser keranjang */
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #BBDEFB; /* Biru langit cerah */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* Tombol Home */
        .btn-home {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 30px;
            text-decoration: none;
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 20;
        }

        /* Papan Skor dan Nyawa */
        .hud {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            border: 3px solid #FF9800;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            z-index: 10;
            text-align: right;
            min-width: 120px;
        }

        .score-text {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }

        .lives-text {
            font-size: 18px;
            margin-top: 5px;
        }

        /* Layar Game Over */
        .game-over {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7);
            z-index: 50;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .game-over h1 {
            font-size: 40px;
            color: #FF5252;
            text-shadow: 2px 2px 0px #FFF;
            margin-bottom: 10px;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .btn-restart {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 3px solid #FFF;
        }

        .btn-restart:active {
            transform: scale(0.95);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-home">🏠</a>

    <div class="hud">
        <div class="score-text" id="scoreDisplay">⭐ 0</div>
        <div class="lives-text" id="livesDisplay">❤️❤️❤️</div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h1>Yaaah, Selesai!</h1>
        <p id="finalScore">Skor Kamu: 0</p>
        <button class="btn-restart" onclick="restartGame()">Main Lagi 🔄</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreText = document.getElementById('finalScore');

        // Ukuran Kanvas mengikuti layar HP
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Variabel Game
        let score = 0;
        let lives = 3;
        let gameActive = true;
        let items = []; // Tempat menyimpan buah/rintangan yang jatuh
        let frameCount = 0;
        let speedMultiplier = 1; // Makin lama makin cepat sedikit

        // Emojis
        const fruits = ['🍎', '🍊', '🍇', '🍓', '🍌'];
        const hazards = ['🐛', '💣'];

        // Keranjang (Player)
        const basket = {
            w: 80,
            h: 80,
            x: canvas.width / 2 - 40,
            y: canvas.height - 100,
            emoji: '🧺'
        };

        // Suara menggunakan Web Audio API
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'catch') {
                // Suara "Ting" lucu saat tangkap buah
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hit') {
                // Suara "Tet-tot" saat kena ulat/bom
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // Fungsi membuat benda jatuh
        function spawnItem() {
            const isHazard = Math.random() < 0.2; // 20% peluang muncul ulat/bom
            const emojiList = isHazard ? hazards : fruits;
            const text = emojiList[Math.floor(Math.random() * emojiList.length)];
            
            items.push({
                x: Math.random() * (canvas.width - 50) + 25, // Jatuh di posisi acak horizontal
                y: -50, // Mulai dari luar layar atas
                size: 40,
                speed: (Math.random() * 3 + 2) * speedMultiplier,
                text: text,
                isHazard: isHazard
            });
        }

        // Fungsi perbarui tampilan dan logika game
        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height); // Bersihkan layar tiap frame

            // Tingkatkan kesulitan seiring waktu
            frameCount++;
            if (frameCount % 60 === 0) { // Sekitar tiap 1 detik
                if (Math.random() < 0.5) spawnItem(); 
                speedMultiplier += 0.01; // Tambah kecepatan jatuhnya sangat perlahan
            }

            // Gambar dan gerakkan benda jatuh
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let i = 0; i < items.length; i++) {
                let item = items[i];
                item.y += item.speed;
                ctx.fillText(item.text, item.x, item.y);

                // Cek tabrakan dengan keranjang (Hitbox sederhana)
                // Keranjang x,y ada di kiri atas. item x,y di tengah teks.
                if (item.y + 20 > basket.y && item.y - 20 < basket.y + basket.h) {
                    if (item.x > basket.x - 20 && item.x < basket.x + basket.w + 20) {
                        // Kena Tangkap!
                        if (item.isHazard) {
                            playSound('hit');
                            lives--;
                            updateHUD();
                            if (lives <= 0) gameOver();
                        } else {
                            playSound('catch');
                            score += 10;
                            updateHUD();
                        }
                        items.splice(i, 1); // Hapus item dari layar
                        i--;
                        continue;
                    }
                }

                // Hapus jika sudah lewat bawah layar (tidak tertangkap)
                if (item.y > canvas.height + 50) {
                    items.splice(i, 1);
                    i--;
                }
            }

            // Gambar Keranjang
            ctx.font = '70px Arial';
            ctx.fillText(basket.emoji, basket.x + basket.w / 2, basket.y + basket.h / 2);

            requestAnimationFrame(update); // Looping game 60 FPS
        }

        // Kontrol Geser Jari (Touch)
        canvas.addEventListener('touchmove', (e) => {
            initAudio(); // Aktifkan audio jika belum
            let touchX = e.touches[0].clientX;
            // Batasi agar keranjang tidak keluar layar
            if (touchX < basket.w / 2) touchX = basket.w / 2;
            if (touchX > canvas.width - basket.w / 2) touchX = canvas.width - basket.w / 2;
            basket.x = touchX - basket.w / 2;
        });

        // Kontrol Mouse (Untuk tes di PC)
        canvas.addEventListener('mousemove', (e) => {
            let mouseX = e.clientX;
            if (mouseX < basket.w / 2) mouseX = basket.w / 2;
            if (mouseX > canvas.width - basket.w / 2) mouseX = canvas.width - basket.w / 2;
            basket.x = mouseX - basket.w / 2;
        });

        function updateHUD() {
            scoreDisplay.innerText = `⭐ ${score}`;
            let hearts = '';
            for (let i = 0; i < lives; i++) hearts += '❤️';
            livesDisplay.innerText = hearts;
        }

        function gameOver() {
            gameActive = false;
            gameOverScreen.style.display = 'flex';
            finalScoreText.innerText = `Skor Kamu: ${score}`;
        }

        function restartGame() {
            score = 0;
            lives = 3;
            speedMultiplier = 1;
            items = [];
            gameActive = true;
            gameOverScreen.style.display = 'none';
            updateHUD();
            update();
        }

        // Mulai Game Loop
        update();

    </script>
</body>
</html>
