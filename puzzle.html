<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Anak: Puzzle Mobil!</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: none; /* Mencegah layar tergeser di HP */
            margin: 0;
            padding: 0;
            user-select: none; /* Mencegah blok teks biru di PC */
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #E0F7FA; 
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        .btn-home {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 30px;
            text-decoration: none;
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 20;
        }

        h1 {
            font-size: 24px;
            color: #FF9800;
            margin-top: 20px;
            margin-bottom: 20px;
            text-shadow: 1px 1px 0px #FFF;
            z-index: 10;
        }

        /* Area Jalan Raya (Tempat Bayangan) */
        .road-container {
            background-color: #757575; 
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            border: 4px dashed #FFEB3B; 
            margin-bottom: 40px;
        }

        .shadow-box {
            height: 80px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            filter: brightness(0) opacity(0.5); /* Trik bayangan hitam */
        }

        /* Area Mobil */
        .cars-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .car {
            font-size: 50px;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            cursor: grab;
            position: relative;
            z-index: 15;
            transition: transform 0.1s;
        }

        .car:active {
            cursor: grabbing;
        }

        .win-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.9);
            z-index: 50;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .win-screen h2 {
            font-size: 36px;
            color: #4CAF50;
            margin-bottom: 20px;
        }

        .btn-restart {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-home">🏠</a>

    <h1>Pasangkan Mobilnya! 🚓</h1>

    <div class="road-container" id="shadows"></div>
    <div class="cars-container" id="cars"></div>

    <div class="win-screen" id="winScreen">
        <h2>Pintar Sekali! 🎉</h2>
        <button class="btn-restart" onclick="startGame()">Main Lagi 🔄</button>
    </div>

    <script>
        const vehicles = [
            { id: 'v1', emoji: '🚓' }, 
            { id: 'v2', emoji: '🚑' }, 
            { id: 'v3', emoji: '🚒' }, 
            { id: 'v4', emoji: '🚕' }  
        ];

        let matchedCount = 0;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'match') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function startGame() {
            matchedCount = 0;
            document.getElementById('winScreen').style.display = 'none';
            
            const shadowContainer = document.getElementById('shadows');
            const carContainer = document.getElementById('cars');
            shadowContainer.innerHTML = '';
            carContainer.innerHTML = '';

            const shuffledShadows = [...vehicles].sort(() => Math.random() - 0.5);
            const shuffledCars = [...vehicles].sort(() => Math.random() - 0.5);

            shuffledShadows.forEach(v => {
                const shadow = document.createElement('div');
                shadow.classList.add('shadow-box');
                shadow.dataset.id = v.id;
                shadow.innerText = v.emoji;
                shadowContainer.appendChild(shadow);
            });

            shuffledCars.forEach(v => {
                const car = document.createElement('div');
                car.classList.add('car');
                car.dataset.id = v.id;
                car.innerText = v.emoji;
                setupDrag(car); 
                carContainer.appendChild(car);
            });
        }

        // --- FUNGSI DRAG (MENDUKUNG MOUSE PC & TOUCH HP) ---
        function setupDrag(el) {
            let startX = 0, startY = 0, currentX = 0, currentY = 0;
            let isDragging = false;

            function dragStart(e) {
                isDragging = true;
                initAudio();
                
                // Cek apakah klik berasal dari Mouse (PC) atau Jari (HP)
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

                startX = clientX - currentX;
                startY = clientY - currentY;
                
                el.style.zIndex = "100";
                el.style.transition = "none"; // Matikan animasi agar mengikuti kursor dengan pas
            }

            function drag(e) {
                if (!isDragging) return;
                e.preventDefault(); // Mencegah layar PC blok teks atau layar HP scroll
                
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

                currentX = clientX - startX;
                currentY = clientY - startY;
                
                el.style.transform = `translate(${currentX}px, ${currentY}px) scale(1.1)`;
            }

            function dragEnd(e) {
                if (!isDragging) return;
                isDragging = false;
                
                el.style.zIndex = "15";
                el.style.transition = "transform 0.3s ease"; // Nyalakan lagi animasinya

                checkMatch(el);
            }

            // Fungsi Logika Benar/Salah dipindah ke dalam sini agar bisa mereset posisi dengan mudah
            function checkMatch(car) {
                const carId = car.dataset.id;
                const targetShadow = document.querySelector(`.shadow-box[data-id='${carId}']`);
                
                const carRect = car.getBoundingClientRect();
                const shadowRect = targetShadow.getBoundingClientRect();

                // Cek apakah mobil ditaruh di atas bayangan
                const isOverlapping = !(
                    carRect.right < shadowRect.left || 
                    carRect.left > shadowRect.right || 
                    carRect.bottom < shadowRect.top || 
                    carRect.top > shadowRect.bottom
                );

                if (isOverlapping) {
                    playSound('match');
                    
                    // Tempelkan mobil ke tengah bayangan
                    car.style.transform = "translate(0px, 0px)";
                    car.style.position = "absolute";
                    car.style.left = `${shadowRect.left + (shadowRect.width - carRect.width)/2}px`;
                    car.style.top = `${shadowRect.top + (shadowRect.height - carRect.height)/2}px`;
                    
                    car.style.pointerEvents = "none"; // Kunci mobil
                    car.style.boxShadow = "none";
                    car.style.backgroundColor = "transparent";
                    
                    matchedCount++;
                    if (matchedCount === vehicles.length) {
                        setTimeout(() => {
                            document.getElementById('winScreen').style.display = 'flex';
                        }, 500);
                    }
                } else {
                    // Salah! Kembalikan ke tempat asal (Reset nilai X dan Y)
                    playSound('wrong');
                    currentX = 0;
                    currentY = 0;
                    car.style.transform = `translate(0px, 0px) scale(1)`;
                }
            }

            // Event Listener untuk HP (Layar Sentuh)
            el.addEventListener('touchstart', dragStart, {passive: false});
            window.addEventListener('touchmove', drag, {passive: false});
            window.addEventListener('touchend', dragEnd);

            // Event Listener untuk Laptop/PC (Mouse)
            el.addEventListener('mousedown', dragStart);
            window.addEventListener('mousemove', drag); // Dipasang di window agar kursor tidak lepas saat ditarik cepat
            window.addEventListener('mouseup', dragEnd);
        }

        startGame();
    </script>
</body>
</html>
