<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Anak: Cilukba Hewan!</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #81C784; /* Hijau rumput ceria */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* Tombol Kembali ke Beranda */
        .btn-home {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 30px;
            text-decoration: none;
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 20;
        }

        /* Papan Skor */
        .header {
            margin-top: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 3px solid #4CAF50;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 22px;
            color: #FF5722;
            margin-bottom: 5px;
        }

        .score {
            font-size: 28px;
            font-weight: bold;
            color: #2196F3;
        }

        /* Area Tanah & Lubang */
        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Kolom untuk layar HP */
            gap: 20px;
            margin-top: 40px;
            width: 90%;
            max-width: 400px;
        }

        .hole {
            width: 120px;
            height: 120px;
            background-color: #5D4037; /* Warna tanah */
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-bottom: 8px solid #3E2723; /* Efek kedalaman lubang */
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.5);
        }

        /* Hewan yang Muncul */
        .animal {
            font-size: 70px;
            position: absolute;
            bottom: -80px; /* Sembunyi di bawah */
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efek memantul saat muncul */
            cursor: pointer;
        }

        .animal.up {
            bottom: 10px; /* Muncul ke atas */
        }

        /* Ikon Hati saat berhasil disentuh */
        .heart {
            position: absolute;
            font-size: 40px;
            pointer-events: none;
            animation: floatHeart 0.8s ease-out forwards;
            z-index: 15;
        }

        @keyframes floatHeart {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-80px); opacity: 0; }
        }

    </style>
</head>
<body>

    <a href="index.html" class="btn-home">🏠</a>

    <div class="header">
        <h1>Cilukba! Sentuh Hewannya!</h1>
        <div class="score" id="scoreDisplay">💖 0</div>
    </div>

    <div class="game-board">
        <div class="hole"><div class="animal" id="a1"></div></div>
        <div class="hole"><div class="animal" id="a2"></div></div>
        <div class="hole"><div class="animal" id="a3"></div></div>
        <div class="hole"><div class="animal" id="a4"></div></div>
        <div class="hole"><div class="animal" id="a5"></div></div>
        <div class="hole"><div class="animal" id="a6"></div></div>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole');
        const animals = document.querySelectorAll('.animal');
        const scoreDisplay = document.getElementById('scoreDisplay');
        let lastHole;
        let timeUp = false;
        let score = 0;

        // Daftar hewan yang akan muncul
        const animalList = ['🐶', '🐱', '🐰', '🐻', '🐼', '🐯', '🐮', '🐷'];

        // Inisialisasi Audio Context
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Efek suara lucu (bloop) saat hewan disentuh
        function playBloopSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            // Suara meluncur dari nada tinggi ke rendah (efek boop)
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Memilih waktu acak hewan muncul (antara 800ms sampai 1500ms)
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        // Memilih lubang acak yang tidak sama dengan lubang sebelumnya
        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(800, 1500); // Kecepatan muncul-hilang (ramah anak)
            const hole = randomHole(holes);
            const animalEl = hole.querySelector('.animal');
            
            // Ganti hewan secara acak setiap kali muncul
            const randomAnimal = animalList[Math.floor(Math.random() * animalList.length)];
            animalEl.innerText = randomAnimal;
            animalEl.dataset.isTapped = "false"; // Reset status sentuhan

            // Munculkan hewan
            animalEl.classList.add('up');

            // Sembunyikan hewan setelah waktu habis
            setTimeout(() => {
                animalEl.classList.remove('up');
                if (!timeUp) peep(); // Lanjut munculkan hewan berikutnya
            }, time);
        }

        // Event saat hewan disentuh/di-tap
        function catchAnimal(e) {
            if (!e.isTrusted) return; // Mencegah klik palsu
            if (this.dataset.isTapped === "true") return; // Cegah di-tap berkali-kali

            this.dataset.isTapped = "true";
            score++;
            scoreDisplay.innerText = `💖 ${score}`;
            
            this.classList.remove('up'); // Langsung sembunyikan hewannya
            playBloopSound(); // Mainkan suara

            // Efek visual Hati terbang
            showHeart(e.clientX, e.clientY);
        }

        function showHeart(x, y) {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = '💖';
            heart.style.left = `${x - 20}px`;
            heart.style.top = `${y - 20}px`;
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 800);
        }

        animals.forEach(animal => animal.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Mencegah *delay* klik di HP
            catchAnimal.call(this, e.touches[0]); // Ambil koordinat sentuhan pertama
        }));

        animals.forEach(animal => animal.addEventListener('mousedown', catchAnimal)); // Untuk di laptop

        // Mulai game (Munculkan setelah delay sedikit agar halaman siap)
        setTimeout(() => {
            peep();
        }, 1000);

    </script>
</body>
</html>
