<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Anak: Piano Ajaib!</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: manipulation; /* Mencegah zoom */
            margin: 0;
            padding: 0;
            user-select: none; /* Mencegah teks terblok */
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #FCE4EC; /* Pink pastel lembut */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        h1 {
            font-size: 24px;
            color: #E91E63;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #FFF;
            z-index: 10;
        }

        /* Wadah Piano (Bentuk Xylophone agar pas di HP Portrait) */
        .piano-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        /* Tuts Piano */
        .key {
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        /* Efek saat ditekan */
        .key:active, .key.active {
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }

        /* Warna Tuts Pelangi */
        .c { background-color: #FF5252; width: 100%; margin: 0 auto; }
        .d { background-color: #FF9800; width: 95%; margin: 0 auto; }
        .e { background-color: #FFEB3B; color: #333; width: 90%; margin: 0 auto; }
        .f { background-color: #4CAF50; width: 85%; margin: 0 auto; }
        .g { background-color: #2196F3; width: 80%; margin: 0 auto; }
        .a { background-color: #3F51B5; width: 75%; margin: 0 auto; }
        .b { background-color: #9C27B0; width: 70%; margin: 0 auto; }
        .c2 { background-color: #E91E63; width: 65%; margin: 0 auto; }

        /* Tombol Kembali ke Beranda */
        .btn-home {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 30px;
            text-decoration: none;
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 20;
        }

        /* Animasi Bintang Terbang */
        .star {
            position: absolute;
            font-size: 40px;
            pointer-events: none;
            animation: flyUp 1s ease-out forwards;
            z-index: 5;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-home">🏠</a>

    <h1>Piano Ajaib! 🎵</h1>

    <div class="piano-container">
        <div class="key c" onclick="playTone(261.63, this, '⭐')"><span>Do</span><span>🐻</span></div>
        <div class="key d" onclick="playTone(293.66, this, '🎵')"><span>Re</span><span>🐸</span></div>
        <div class="key e" onclick="playTone(329.63, this, '✨')"><span>Mi</span><span>🐱</span></div>
        <div class="key f" onclick="playTone(349.23, this, '🌟')"><span>Fa</span><span>🐶</span></div>
        <div class="key g" onclick="playTone(392.00, this, '🎈')"><span>Sol</span><span>🐰</span></div>
        <div class="key a" onclick="playTone(440.00, this, '💖')"><span>La</span><span>🐯</span></div>
        <div class="key b" onclick="playTone(493.88, this, '🎶')"><span>Si</span><span>🐼</span></div>
        <div class="key c2" onclick="playTone(523.25, this, '🎉')"><span>Do</span><span>🦁</span></div>
    </div>

    <script>
        // Inisialisasi Audio Context (Sistem Suara Bawaan Browser)
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(frequency, element, emoji) {
            initAudio(); // Pastikan audio aktif saat layar ditekan

            // Membuat suara (Synthesizer sederhana)
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; // Suara bulat dan lembut seperti bell/xylophone
            oscillator.frequency.value = frequency;
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            // Efek suara memudar (fade out)
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
            oscillator.stop(audioCtx.currentTime + 1);

            // Efek Visual Bintang Terbang
            createFloatingEmoji(element, emoji);
        }

        function createFloatingEmoji(element, emoji) {
            const rect = element.getBoundingClientRect();
            const floating = document.createElement('div');
            floating.classList.add('star');
            floating.innerText = emoji;
            
            // Posisi di tengah tuts yang ditekan
            floating.style.left = `${rect.left + rect.width / 2 - 20}px`;
            floating.style.top = `${rect.top}px`;
            
            document.body.appendChild(floating);

            // Hapus elemen setelah animasi selesai
            setTimeout(() => {
                floating.remove();
            }, 1000);
        }
    </script>
</body>
</html>
